<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Happy Birthday Platformer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,700&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #2b1d10;
    font-family: 'Playfair Display', Georgia, serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #gameCanvas {
    position: fixed;
    inset: 0;
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    background: #e8d7ae;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 2.4vh, 22px);
    text-align: center;
    padding: 6vh 6vw;
    background:
      radial-gradient(circle at 50% 35%, #f2e2bd 0%, #d9c39a 45%, #8a6a42 100%);
    color: #2b1a0d;
    transition: opacity 0.25s ease;
  }
  .overlay.hidden { display: none; }

  #splashScreen {
    z-index: 22;
    background: #14100a;
  }
  #splashVideo {
    max-width: 92vw;
    max-height: 68vh;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #splashScreen p {
    color: #f2e2bd;
    background: rgba(255,255,255,0.12);
  }

  .overlay h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 6.6vw, 3.1rem);
    margin: 0;
    line-height: 1.25;
    text-shadow: 0 2px 0 rgba(255,255,255,0.3);
  }
  .overlay p {
    font-size: clamp(1.1rem, 3.8vw, 1.55rem);
    margin: 0;
    font-weight: 500;
    opacity: 0.9;
  }
  .controlsHint {
    font-family: 'Special Elite', monospace;
    font-size: clamp(0.85rem, 2.6vw, 1.05rem) !important;
    opacity: 0.85 !important;
    background: rgba(43,26,13,0.1);
    border: 1px solid rgba(43,26,13,0.3);
    padding: 0.5em 1em;
    border-radius: 4px;
  }

  .bigBtn {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5.6vw, 2.3rem);
    font-weight: 900;
    color: #f2e2bd;
    background: #5c3a20;
    border: 3px solid #2b1a0d;
    border-radius: 6px;
    padding: 0.6em 1.6em;
    box-shadow: 0 6px 0 #2b1a0d, 0 8px 14px rgba(0,0,0,0.35);
    cursor: pointer;
    touch-action: manipulation;
    transform: translateY(0);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .bigBtn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 #2b1a0d, 0 2px 6px rgba(0,0,0,0.35);
  }

  #hud {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 0; right: 0;
    z-index: 15;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  #hud.hidden { display: none; }
  #hud .pill {
    font-family: 'Playfair Display', serif;
    background: rgba(43,26,13,0.75);
    color: #f2e2bd;
    font-weight: 700;
    font-size: clamp(1.2rem, 4.6vw, 1.7rem);
    padding: 0.4em 1.1em;
    border-radius: 6px;
    border: 1px solid rgba(242,226,189,0.4);
  }

  #eggMessage {
    position: fixed;
    inset: 0;
    z-index: 25;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #eggMessage.show { opacity: 1; }
  #eggMessage span {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 7.5vw, 3.6rem);
    font-weight: 900;
    color: #2b1a0d;
    background: rgba(242,226,189,0.92);
    border: 3px solid #2b1a0d;
    border-radius: 8px;
    text-align: center;
    padding: 0.4em 0.8em;
    margin: 0 8vw;
    animation: eggPop 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes eggPop {
    0% { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  #flashOverlay {
    position: fixed;
    inset: 0;
    z-index: 24;
    background: #fff8e0;
    opacity: 0;
    pointer-events: none;
  }
  #flashOverlay.flash { animation: flashAnim 0.7s ease-out; }
  @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

  #egg26Panel {
    margin-top: 4px;
    padding: 12px 16px;
    border-radius: 4px;
    background: rgba(255,255,255,0.35);
    border: 3px double #7a2530;
    box-shadow: 0 0 0 4px #f2e2bd inset;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    max-width: 80vw;
  }
  #egg26Panel.show { display: flex; }
  #egg26PhotoBox {
    width: min(64vw, 320px);
    height: min(64vw, 320px);
    border-radius: 4px;
    background: linear-gradient(135deg, #d9c39a, #f2e2bd);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    overflow: hidden;
  }
  #egg26PhotoBox img, #egg26PhotoBox video { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden"><div class="pill">Punkte: <span id="scoreDisplay">0</span></div></div>

<div id="flashOverlay"></div>
<div id="eggMessage"><span id="eggMessageText"></span></div>

<div id="splashScreen" class="overlay">
  <video id="splashVideo" src="assets/silly_walk.mp4" autoplay muted playsinline></video>
  <p class="controlsHint">Tippen zum Überspringen</p>
</div>

<div id="startScreen" class="overlay hidden">
  <h1>Happy Birthday, <span id="nameSpan"></span>!</h1>
  <p>Escape the Doctor</p>
  <button id="startBtn" class="bigBtn">START</button>
  <p class="controlsHint">Oben tippen = Springen &nbsp;|&nbsp; Unten halten = Ducken</p>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <h1>Game Over</h1>
  <p>Sie haben einen Bandscheibenvorfall...</p>
  <p id="finalScore">Punkte: 0</p>
  <div id="egg26Panel">
    <div id="egg26PhotoBox"></div>
    <p style="margin:0;font-weight:800;color:#7a2530;">Alles Gute zum 26., Katalin!</p>
  </div>
  <button id="retryBtn" class="bigBtn">Nochmal?</button>
</div>

<script>
"use strict";

/* ============================================================
   CONFIG — swap the name here, everything else updates itself
   ============================================================ */
const NAME_PLACEHOLDER = "Katalin";
document.getElementById("nameSpan").textContent = NAME_PLACEHOLDER;

/* ============================================================
   Sprite / photo loading. Vintage Victorian-engraving cut-out
   art (Monty Python's Flying Circus style). Falls back to simple
   drawn shapes if an image hasn't loaded yet.
   ============================================================ */
const images = {};
function loadImage(key, src) {
  const img = new Image();
  img.src = src;
  images[key] = img;
  return img;
}
function imgReady(key) {
  const img = images[key];
  return img && img.complete && img.naturalWidth > 0;
}
function aspectOf(key, fallback) {
  const img = images[key];
  return (img && img.naturalWidth) ? img.naturalWidth / img.naturalHeight : fallback;
}

loadImage('player', 'assets/player.png'); // full-body photo cut-out
loadImage('doctor', 'assets/doctor.png');
loadImage('cake', 'assets/cake.png');
loadImage('gift', 'assets/gift.png');
// REPLACE: no dedicated 26th-birthday photo yet — drop one in and uncomment:
// loadImage('birthday26', 'assets/birthday26.jpg');

const GROUND_OBSTACLE_KEYS = ['ground_scroll', 'ground_rockface', 'ground_books', 'ground_bathtub'];
const OVERHANG_OBSTACLE_KEYS = ['overhang_stethoscope', 'overhang_chandelier', 'overhang_pocketwatch', 'overhang_skeleton', 'overhang_bunting'];
for (const k of GROUND_OBSTACLE_KEYS) loadImage(k, 'assets/' + k + '.png');
for (const k of OVERHANG_OBSTACLE_KEYS) loadImage(k, 'assets/' + k + '.png');

const BG_LAYER_KEYS = ['background_1', 'background_2', 'background_3'];
for (const k of BG_LAYER_KEYS) loadImage(k, 'assets/' + k + '.png');
const PEEK_HEAD_KEYS = ['peekhead_1', 'peekhead_2', 'peekhead_3', 'peekhead_4', 'peekhead_5'];
for (const k of PEEK_HEAD_KEYS) loadImage(k, 'assets/' + k + '.png');

/* ============================================================
   SPLASH VIDEO — plays once on page load, then reveals Start
   ============================================================ */
(function setupSplash() {
  const splash = document.getElementById('splashScreen');
  const video = document.getElementById('splashVideo');
  let dismissed = false;
  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    splash.classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
    try { video.pause(); } catch (e) {}
  }
  video.addEventListener('ended', dismiss);
  video.addEventListener('error', dismiss);
  splash.addEventListener('pointerdown', dismiss);
  setTimeout(dismiss, 12000); // safety net if autoplay is blocked
})();

/* ============================================================
   CANVAS / RESPONSIVE SETUP
   ============================================================ */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let W = window.innerWidth;
let H = window.innerHeight;

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);
resizeCanvas();

function groundY() { return H * 0.78; }

/* ============================================================
   GAME STATE
   ============================================================ */
let state = "start"; // 'start' | 'intro' | 'playing' | 'gameover'
let secretUnlocked = false;
let typedBuffer = "";
let score = 0;
let elapsed = 0;
let cameraX = 0;
let scrollSpeed = 0;
let egg1307Fired = false;
let doctorDancing = false;
let doctorDanceEnd = 0;
let introTimer = 0;

let bikePowerupFired = false;
let bikeActive = false;
let bikeEndTime = 0;
const BIKE_TRIGGER_SCORE = 11; // "ab ca. 10-12 Punkten"
const BIKE_DURATION = 7;       // seconds of clear straight-track riding
const BIKE_SPEED_MULT = 1.4;

const PLAYER_SCREEN_X_RATIO = 0.24;

// total on-screen height of the player sprite (bigger = easier to see)
const PLAYER_STAND_H = () => H * 0.20;
const PLAYER_DUCK_H = () => H * 0.14;

const player = {
  hoverY: 0, vy: 0,          // hoverY = height above ground baseline
  jumpsUsed: 0,
  grounded: true,
  duckHeld: false,
  mouthOpenUntil: 0,
  sparkleUntil: 0,
  runPhase: 0,
};

function playerHeight() {
  return player.duckHeld && player.grounded ? PLAYER_DUCK_H() : PLAYER_STAND_H();
}
function playerWidth() {
  return playerHeight() * aspectOf('player', 600 / 900);
}

const doctor = {
  screenX: -9999,   // used only during intro (absolute screen space)
  worldX: 0,
  bouncePhase: 0,
  signScale: 0,
};

function doctorSize() {
  const height = H * 0.19;
  const width = height * aspectOf('doctor', 0.5625);
  return { width, height };
}

let obstacles = [];   // {type:'rock'|'overhang', x, width, spriteKey, [height]}
let items = [];        // {kind:'cake'|'gift', x, y, size, collected}
let particles = [];
let spawnCursor = 0;

const OVERHANG_BOTTOM_RATIO = 0.635; // fraction of H; must duck under this
const ROCK_HEIGHT = () => H * 0.105; // must be well under max jump apex (~0.184H)

function groundObstacleSize(spriteKey) {
  const height = ROCK_HEIGHT();
  const width = height * aspectOf(spriteKey, 1);
  return { width, height };
}
function overhangObstacleSize(spriteKey) {
  let height = H * OVERHANG_BOTTOM_RATIO;
  let width = height * aspectOf(spriteKey, 0.6);
  const maxWidth = H * 0.32;
  if (width > maxWidth) { width = maxWidth; height = width / aspectOf(spriteKey, 0.6); }
  return { width, height };
}

/* ============================================================
   AUDIO — tiny WebAudio jingles, no external files
   ============================================================ */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  return audioCtx;
}
function playTone(freq, startTime, duration, type = "sine", vol = 0.18) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}
function playJingle() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    const notes = [523.25, 587.33, 659.25, 783.99, 659.25, 880.00];
    notes.forEach((f, i) => playTone(f, t0 + i * 0.16, 0.3, "triangle"));
  } catch (e) { /* audio not available, ignore */ }
}
function playChime() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    [660, 880, 1108].forEach((f, i) => playTone(f, t0 + i * 0.09, 0.35, "sine", 0.14));
  } catch (e) {}
}
function playStinger() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    // comedic "dun dun DUUUN" descending sting for the intro cutscene
    [392, 349.23, 261.63].forEach((f, i) => playTone(f, t0 + i * 0.32, i === 2 ? 0.9 : 0.28, "sawtooth", 0.12));
  } catch (e) {}
}
function playBikeBell() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    [1568, 1976, 1568, 1976].forEach((f, i) => playTone(f, t0 + i * 0.11, 0.2, "square", 0.10));
  } catch (e) {}
}

/* ============================================================
   INPUT — top half of screen = jump (tap), bottom half = duck (hold)
   ============================================================ */
function tryJump() {
  if (state !== "playing") return;
  const maxJumps = secretUnlocked ? Infinity : 1;
  if (player.grounded || player.jumpsUsed < maxJumps) {
    player.vy = H * 1.15;
    player.jumpsUsed += 1;
    player.grounded = false;
    player.duckHeld = false;
  }
}
function startDuck() { if (state === "playing") player.duckHeld = true; }
function endDuck() { player.duckHeld = false; }

canvas.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  if (state !== "playing") return;
  const rect = canvas.getBoundingClientRect();
  const y = e.clientY - rect.top;
  if (y > H * 0.5) startDuck(); else tryJump();
});
canvas.addEventListener("pointerup", (e) => { e.preventDefault(); endDuck(); });
canvas.addEventListener("pointercancel", () => endDuck());
canvas.addEventListener("pointerleave", () => endDuck());

window.addEventListener("keydown", (e) => {
  if (["Space", "ArrowUp", "ArrowDown", "KeyS"].includes(e.code)) e.preventDefault();
  if (state === "start") {
    if (/^[a-zA-Z]$/.test(e.key)) {
      typedBuffer = (typedBuffer + e.key.toUpperCase()).slice(-20);
      if (typedBuffer.includes("GEBURTSTAG")) secretUnlocked = true; // silent easter egg, no on-screen hint
    }
  } else if (state === "playing") {
    if (e.code === "Space" || e.code === "ArrowUp") tryJump();
    if (e.code === "ArrowDown" || e.code === "KeyS") startDuck();
  }
}, { passive: false });

window.addEventListener("keyup", (e) => {
  if (e.code === "ArrowDown" || e.code === "KeyS") endDuck();
});

document.getElementById("startBtn").addEventListener("click", beginIntro);
document.getElementById("retryBtn").addEventListener("click", beginIntro);

/* ============================================================
   BACKGROUND — real illustrated parallax mountains + peeking heads
   ============================================================ */
function drawBgLayer(key, targetHeight, parallax, baselineY) {
  const img = images[key];
  if (!img || !img.complete || !img.naturalWidth) return;
  const aspect = img.naturalWidth / img.naturalHeight;
  const h = targetHeight;
  const w = h * aspect;
  const offset = (cameraX * parallax) % w;
  const count = Math.ceil(W / w) + 2;
  for (let i = -1; i <= count; i++) {
    ctx.drawImage(img, -offset + i * w, baselineY - h, w, h);
  }
}

let peek = { active: false, key: null, x: 0, timer: 2 + Math.random() * 3 };
function updatePeek(dt) {
  peek.timer -= dt;
  if (peek.timer <= 0) {
    if (peek.active) {
      peek.active = false;
      peek.timer = 3 + Math.random() * 5;
    } else {
      peek.active = true;
      peek.key = PEEK_HEAD_KEYS[(Math.random() * PEEK_HEAD_KEYS.length) | 0];
      peek.x = W * (0.15 + Math.random() * 0.7);
      peek.timer = 1.8 + Math.random() * 1.4;
    }
  }
}
function drawPeek() {
  if (!peek.active || !imgReady(peek.key)) return;
  const img = images[peek.key];
  const aspect = img.naturalWidth / img.naturalHeight;
  const h = H * 0.12;
  const w = h * aspect;
  const y = groundY() - H * 0.36 + Math.sin(elapsed * 2) * H * 0.006;
  ctx.drawImage(img, peek.x - w / 2, y - h, w, h);
}

function drawBackground() {
  // aged parchment sky
  const sky = ctx.createLinearGradient(0, 0, 0, groundY());
  sky.addColorStop(0, "#d9c49c");
  sky.addColorStop(0.55, "#e8d7ae");
  sky.addColorStop(1, "#f0e2bd");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, groundY());

  // engraved sun with radiating ink lines
  const sunX = W * 0.82, sunY = H * 0.18, sunR = H * 0.06;
  ctx.strokeStyle = "rgba(90,60,30,0.4)";
  ctx.lineWidth = Math.max(1.5, H * 0.003);
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(sunX + Math.cos(a) * sunR * 1.15, sunY + Math.sin(a) * sunR * 1.15);
    ctx.lineTo(sunX + Math.cos(a) * sunR * 1.7, sunY + Math.sin(a) * sunR * 1.7);
    ctx.stroke();
  }
  ctx.fillStyle = "#f3e2b0";
  ctx.beginPath();
  ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = "#8a6a3f";
  ctx.lineWidth = Math.max(2, H * 0.004);
  ctx.stroke();

  // real illustrated mountain ranges, back to front
  drawBgLayer('background_1', H * 0.42, 0.12, groundY() + H * 0.01);
  drawBgLayer('background_2', H * 0.50, 0.24, groundY() + H * 0.015);
  drawPeek();
  drawBgLayer('background_3', H * 0.58, 0.40, groundY() + H * 0.02);

  // haze near the mountain base
  const mist = ctx.createLinearGradient(0, groundY() - H * 0.12, 0, groundY());
  mist.addColorStop(0, "rgba(235,215,175,0)");
  mist.addColorStop(1, "rgba(235,215,175,0.4)");
  ctx.fillStyle = mist;
  ctx.fillRect(0, groundY() - H * 0.12, W, H * 0.12);
}

function drawGroundAndGrid() {
  const gy = groundY();
  const floor = ctx.createLinearGradient(0, gy, 0, H);
  floor.addColorStop(0, "#7a5c3a");
  floor.addColorStop(1, "#43301d");
  ctx.fillStyle = floor;
  ctx.fillRect(0, gy, W, H - gy);

  ctx.fillStyle = "#2f2213";
  ctx.fillRect(0, gy, W, Math.max(2, H * 0.006));

  // simple dashed dirt-road texture scrolling by
  const spacing = H * 0.05;
  const offset = cameraX % (spacing * 2);
  ctx.strokeStyle = "rgba(255,240,210,0.2)";
  ctx.lineWidth = H * 0.006;
  for (let x = -offset; x < W + spacing * 2; x += spacing * 2) {
    ctx.beginPath();
    ctx.moveTo(x, gy + H * 0.03);
    ctx.lineTo(x + spacing, gy + H * 0.03);
    ctx.stroke();
  }
}

function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.95);
  g.addColorStop(0, "rgba(35,22,10,0)");
  g.addColorStop(1, "rgba(35,22,10,0.38)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

/* ============================================================
   OBSTACLE / ITEM GENERATION
   ============================================================ */
function resetWorld() {
  obstacles = [];
  items = [];
  particles = [];
  spawnCursor = H * 1.2;
}

function generateAhead() {
  while (spawnCursor < cameraX + W * 1.6 + H * 1.5) {
    const gap = H * (0.55 + Math.random() * 0.5);
    spawnCursor += gap;

    if (!bikeActive) {
      const roll = Math.random();
      if (roll < 0.4) {
        const spriteKey = GROUND_OBSTACLE_KEYS[(Math.random() * GROUND_OBSTACLE_KEYS.length) | 0];
        const { width } = groundObstacleSize(spriteKey);
        obstacles.push({ type: "rock", x: spawnCursor, width, spriteKey });
        spawnCursor += width;
      } else if (roll < 0.75) {
        const spriteKey = OVERHANG_OBSTACLE_KEYS[(Math.random() * OVERHANG_OBSTACLE_KEYS.length) | 0];
        const { width, height } = overhangObstacleSize(spriteKey);
        obstacles.push({ type: "overhang", x: spawnCursor, width, height, spriteKey, wobble: Math.random() * Math.PI * 2 });
        spawnCursor += width;
      }
    }

    // sprinkle a collectible in the clear stretch that follows
    if (Math.random() < 0.8) {
      const itemGap = H * (0.13 + Math.random() * 0.2);
      const ix = spawnCursor + itemGap;
      const size = H * 0.055;
      const arcHeight = Math.random() < 0.4 ? H * 0.20 : 0;
      items.push({
        kind: Math.random() < 0.55 ? "cake" : "gift",
        x: ix, size,
        y: groundY() - size - arcHeight,
        collected: false,
      });
      spawnCursor = ix + size;
    }
    spawnCursor += H * 0.06;
  }
}

function pruneBehindCamera() {
  obstacles = obstacles.filter(o => o.x + o.width > cameraX - W * 0.3);
  items = items.filter(it => !it.collected && it.x + it.size > cameraX - W * 0.3);
}

/* ============================================================
   RESET / START / INTRO
   ============================================================ */
function resetGame() {
  score = 0;
  elapsed = 0;
  cameraX = 0;
  scrollSpeed = H * 0.40;
  egg1307Fired = false;
  doctorDancing = false;
  bikePowerupFired = false;
  bikeActive = false;
  particles = [];

  player.hoverY = 0;
  player.vy = 0;
  player.jumpsUsed = 0;
  player.grounded = true;
  player.duckHeld = false;
  player.mouthOpenUntil = 0;
  player.sparkleUntil = 0;

  doctor.worldX = cameraX + W * PLAYER_SCREEN_X_RATIO - H * 0.62;

  resetWorld();
  generateAhead();
  updateScoreDisplay();
}

function beginIntro() {
  resetGame();
  state = "intro";
  introTimer = 0;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameOverScreen").classList.add("hidden");
  document.getElementById("egg26Panel").classList.remove("show");
  document.getElementById("hud").classList.add("hidden");
  try { getAudioCtx().resume(); } catch (e) {}
  playStinger();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function startPlaying() {
  state = "playing";
  document.getElementById("hud").classList.remove("hidden");
}

function gameOver() {
  state = "gameover";
  document.getElementById("hud").classList.add("hidden");
  document.getElementById("eggMessage").classList.remove("show");
  document.getElementById("finalScore").textContent = "Punkte: " + score;
  const panel = document.getElementById("egg26Panel");
  const box = document.getElementById("egg26PhotoBox");
  if (score === 26) {
    panel.classList.add("show");
    box.innerHTML = '<video src="assets/Monty_Happy_Birthday.mp4" autoplay loop muted playsinline ' +
      'style="cursor:pointer;" onclick="this.muted = !this.muted;"></video>';
    spawnConfetti(140);
    playChime();
  } else {
    panel.classList.remove("show");
    box.innerHTML = "";
  }
  document.getElementById("gameOverScreen").classList.remove("hidden");
}

function updateScoreDisplay() {
  document.getElementById("scoreDisplay").textContent = score;
}

/* ============================================================
   EASTER EGGS & PARTICLES
   ============================================================ */
function showEggMessage(text, ms) {
  const el = document.getElementById("eggMessage");
  document.getElementById("eggMessageText").textContent = text;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), ms);
}

function triggerEgg1307() {
  egg1307Fired = true;
  doctorDancing = true;
  doctorDanceEnd = elapsed + 10;
  playJingle();
  showEggMessage("DR. BANDSCHEIBE TANZT!", 2200);
}

function triggerBikePowerup() {
  bikePowerupFired = true;
  bikeActive = true;
  bikeEndTime = elapsed + BIKE_DURATION;
  // clear the track ahead for a clean straight ride
  obstacles = obstacles.filter(o => o.x < cameraX);
  playBikeBell();
  showEggMessage("YOU GET MARK CAVENDISH!!", 2200);
}

function spawnConfetti(n) {
  const colors = ["#7a2530", "#c9a24a", "#5c3a20", "#8a6a42", "#f2e2bd", "#3a6b4a"];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: W * (0.2 + Math.random() * 0.6),
      y: -Math.random() * H * 0.3,
      vx: (Math.random() - 0.5) * W * 0.4,
      vy: H * (0.15 + Math.random() * 0.35),
      size: H * (0.012 + Math.random() * 0.014),
      color: colors[(Math.random() * colors.length) | 0],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 8,
      life: 3 + Math.random(),
    });
  }
}
function spawnSparkle(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = H * (0.2 + Math.random() * 0.3);
    particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - H * 0.1,
      size: H * 0.010, color: "#c9a24a",
      rot: 0, vr: 0, life: 0.5 + Math.random() * 0.3,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += H * 0.9 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.vr * dt;
    p.life -= dt;
    if (p.life <= 0 || p.y > H + 40) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    ctx.restore();
  }
}

/* ============================================================
   MAIN UPDATE
   ============================================================ */
function aabbOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function updateIntro(dt) {
  introTimer += dt;
  player.runPhase += dt * 4;

  // centered so the sign always has room, regardless of viewport width
  const restX = W * 0.5 - H * 0.045;

  if (introTimer < 0.55) {
    const t = introTimer / 0.55;
    doctor.screenX = -W * 0.3 + (restX + W * 0.3) * (1 - Math.pow(1 - t, 3));
    doctor.signScale = Math.max(0, (t - 0.5) * 2);
  } else if (introTimer < 2.15) {
    doctor.screenX = restX;
    doctor.signScale = Math.min(1, doctor.signScale + dt * 6);
  } else if (introTimer < 2.65) {
    const t = (introTimer - 2.15) / 0.5;
    doctor.screenX = restX - (restX + W * 0.35) * t;
    doctor.signScale = Math.max(0, 1 - t * 1.4);
  } else {
    startPlaying();
  }
}

function update(dt) {
  elapsed += dt;

  if (bikeActive && elapsed >= bikeEndTime) bikeActive = false;

  // speed is H-based (not W-based) so obstacle-clear timing stays fair
  // regardless of the device's screen aspect ratio (portrait vs desktop)
  const baseSpeed = Math.min(H * 0.95, H * 0.40 + elapsed * H * 0.008);
  scrollSpeed = bikeActive ? baseSpeed * BIKE_SPEED_MULT : baseSpeed;
  cameraX += scrollSpeed * dt;

  generateAhead();
  pruneBehindCamera();
  updatePeek(dt);

  const playerScreenX = W * PLAYER_SCREEN_X_RATIO;
  const playerWorldX = cameraX + playerScreenX;

  // --- player vertical physics (hover above ground baseline) ---
  const GRAVITY = H * 3.6;
  player.vy -= GRAVITY * dt;
  player.hoverY += player.vy * dt;
  if (player.hoverY <= 0) {
    player.hoverY = 0;
    player.vy = 0;
    player.grounded = true;
    player.jumpsUsed = 0;
  } else {
    player.grounded = false;
  }
  player.runPhase += dt * (5 + scrollSpeed / H * 4);

  const pW = playerWidth();
  const pH = playerHeight();
  const pTop = groundY() - player.hoverY - pH;

  // --- item collection ---
  for (const it of items) {
    if (it.collected) continue;
    const itScreenX = it.x - cameraX;
    if (aabbOverlap(playerScreenX, pTop, pW, pH, itScreenX, it.y, it.size, it.size)) {
      it.collected = true;
      score += 1;
      updateScoreDisplay();
      if (it.kind === "cake") {
        player.mouthOpenUntil = elapsed + 0.35;
        player.sparkleUntil = elapsed + 0.35;
        spawnSparkle(playerScreenX + pW / 2, pTop, 10);
      } else {
        player.sparkleUntil = elapsed + 0.35;
        spawnSparkle(playerScreenX + pW / 2, pTop, 14);
      }
      if (score === 1307 && !egg1307Fired) triggerEgg1307();
      if (score === BIKE_TRIGGER_SCORE && !bikePowerupFired) triggerBikePowerup();
    }
  }

  // --- obstacle collision (skipped entirely during the bike phase) ---
  if (!bikeActive) {
    for (const o of obstacles) {
      const osx = o.x - cameraX;
      if (osx + o.width < -20 || osx > W + 20) continue;
      if (o.type === "rock") {
        const rockH = ROCK_HEIGHT();
        if (aabbOverlap(playerScreenX, pTop, pW, pH, osx, groundY() - rockH, o.width, rockH)) {
          gameOver();
          return;
        }
      } else {
        const bottom = H * OVERHANG_BOTTOM_RATIO;
        if (aabbOverlap(playerScreenX, pTop, pW, pH, osx, 0, o.width, bottom)) {
          gameOver();
          return;
        }
      }
    }
  }

  // --- doctor AI (chases from behind; falls behind during the bike phase) ---
  if (doctorDancing) {
    if (elapsed >= doctorDanceEnd) doctorDancing = false;
  } else {
    const wobble = Math.sin(elapsed * 0.6) * 0.12;
    const speedMul = 0.80 + Math.min(0.32, elapsed * 0.0016) + wobble;
    doctor.worldX += baseSpeed * speedMul * dt;
  }
  const maxTrailScreen = H * 0.85;
  const minDoctorWorldX = cameraX + playerScreenX - maxTrailScreen;
  if (doctor.worldX < minDoctorWorldX) doctor.worldX = minDoctorWorldX;
  doctor.bouncePhase += dt * 6;

  if (!bikeActive) {
    const doctorScreenX = doctor.worldX - cameraX;
    const { width: doctorW, height: doctorH } = doctorSize();
    const doctorTop = groundY() - doctorH;
    if (aabbOverlap(playerScreenX, pTop, pW, pH, doctorScreenX, doctorTop, doctorW, doctorH)) {
      gameOver();
    }
  }
}

/* ============================================================
   RENDER — player, doctor, obstacles, items
   ============================================================ */
function drawObstacles() {
  for (const o of obstacles) {
    const sx = o.x - cameraX;
    if (sx + o.width < -20 || sx > W + 20) continue;
    if (o.type === "rock") {
      const h = ROCK_HEIGHT();
      const top = groundY() - h;
      if (imgReady(o.spriteKey)) {
        ctx.drawImage(images[o.spriteKey], sx, top, o.width, h);
      } else {
        ctx.fillStyle = "#8a6a42";
        ctx.fillRect(sx, top, o.width, h);
      }
    } else {
      const sway = Math.sin(elapsed * 2 + o.wobble) * 0.09;
      ctx.save();
      ctx.translate(sx + o.width / 2, 0);
      ctx.rotate(sway);
      if (imgReady(o.spriteKey)) {
        ctx.drawImage(images[o.spriteKey], -o.width / 2, 0, o.width, o.height);
      } else {
        ctx.fillStyle = "#6b4e2f";
        ctx.fillRect(-o.width / 2, 0, o.width, o.height);
      }
      ctx.restore();
    }
  }
}

function drawItems() {
  for (const it of items) {
    if (it.collected) continue;
    const sx = it.x - cameraX;
    if (sx < -it.size || sx > W + it.size) continue;
    const bob = Math.sin(elapsed * 3 + it.x) * H * 0.008;
    if (it.kind === "cake") {
      if (imgReady("cake")) {
        ctx.drawImage(images.cake, sx, it.y + bob, it.size, it.size);
      } else {
        ctx.fillStyle = "#f2e2bd";
        ctx.fillRect(sx, it.y + bob, it.size, it.size);
        ctx.font = (it.size * 0.9) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎂", sx + it.size / 2, it.y + bob + it.size / 2 + 1);
      }
    } else {
      if (imgReady("gift")) {
        ctx.drawImage(images.gift, sx, it.y + bob, it.size, it.size);
      } else {
        ctx.fillStyle = "#7a2530";
        ctx.fillRect(sx, it.y + bob, it.size, it.size);
        ctx.font = (it.size * 0.9) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎁", sx + it.size / 2, it.y + bob + it.size / 2 + 1);
      }
    }
  }
}

function drawBike(sx, baseY) {
  // REPLACE: bike sprite placeholder — simple penny-farthing silhouette,
  // drawn behind the player so the big wheel reads as "under/behind her"
  // rather than through her body.
  const bodyW = playerWidth();
  const wheelR = playerHeight() * 0.34;
  const smallR = wheelR * 0.4;
  const hubX = sx - bodyW * 0.15;
  ctx.save();
  ctx.strokeStyle = "#2b1a0d";
  ctx.lineWidth = Math.max(2, wheelR * 0.09);
  ctx.beginPath();
  ctx.arc(hubX, baseY - wheelR, wheelR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(hubX - wheelR * 1.15, baseY - smallR, smallR, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hubX, baseY - wheelR);
  ctx.lineTo(hubX - wheelR * 1.15, baseY - smallR);
  ctx.lineTo(hubX - wheelR * 0.3, baseY - wheelR * 1.55);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawPlayer() {
  const sx = W * PLAYER_SCREEN_X_RATIO;
  const pH = playerHeight();
  const pW = playerWidth();
  const bounce = player.grounded ? Math.abs(Math.sin(player.runPhase)) * H * 0.008 : 0;
  const baseY = groundY() - player.hoverY - bounce;
  const top = baseY - pH;

  if (bikeActive) drawBike(sx, baseY);

  ctx.save();
  if (imgReady("player")) {
    ctx.drawImage(images.player, sx, top, pW, pH);

    // mouth-open reaction overlay — the source is a static photo, so a
    // literal mouth can't animate; we fake it with a small drawn shape
    // positioned over her mouth (fractions tuned to this specific photo).
    if (elapsed < player.mouthOpenUntil) {
      const mx = sx + pW * 0.55;
      const my = top + pH * 0.32;
      ctx.fillStyle = "#5a2020";
      ctx.beginPath();
      ctx.ellipse(mx, my, pW * 0.045, pW * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (elapsed < player.sparkleUntil) {
      drawHeadSparkle(sx + pW * 0.5, top + pH * 0.22, pH * 0.35);
    }
  } else {
    // REPLACE: player placeholder — simple Victorian silhouette.
    ctx.fillStyle = "#7a2530";
    roundRect(sx, top, pW, pH, pW * 0.15);
    ctx.fill();
    ctx.strokeStyle = "#2b1a0d";
    ctx.lineWidth = 2;
    roundRect(sx, top, pW, pH, pW * 0.15);
    ctx.stroke();
  }

  if (secretUnlocked) {
    const cx = sx + pW / 2;
    const cw = pW * 0.5, ch = pH * 0.16;
    const cy = top - ch * 0.5;
    ctx.fillStyle = "#c9a24a";
    ctx.beginPath();
    ctx.moveTo(cx - cw / 2, cy + ch);
    ctx.lineTo(cx - cw / 2, cy + ch * 0.3);
    ctx.lineTo(cx - cw / 4, cy + ch * 0.7);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + cw / 4, cy + ch * 0.7);
    ctx.lineTo(cx + cw / 2, cy + ch * 0.3);
    ctx.lineTo(cx + cw / 2, cy + ch);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawHeadSparkle(cx, cy, d) {
  ctx.save();
  ctx.strokeStyle = "#c9a24a";
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const a = elapsed * 5 + i * (Math.PI / 2);
    const r1 = d * 0.65, r2 = d * 0.85;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawSign(cx, baseY, scale) {
  if (scale <= 0.01 || !imgReady('ground_scroll')) return;
  ctx.save();
  ctx.translate(cx, baseY);
  ctx.scale(scale, scale);
  ctx.rotate(Math.sin(elapsed * 6) * 0.05 - 0.08);
  const img = images.ground_scroll;
  const h = H * 0.34;
  const w = h * (img.naturalWidth / img.naturalHeight);
  ctx.drawImage(img, -w / 2, -h, w, h);
  ctx.restore();
}

function drawDoctor() {
  let sx, dy, rot = 0, signScale = 0;
  const { width: doctorW, height: doctorH } = doctorSize();

  if (state === "intro") {
    sx = doctor.screenX;
    dy = groundY() - doctorH;
    signScale = doctor.signScale;
  } else {
    sx = doctor.worldX - cameraX;
    dy = groundY() - doctorH;
    if (sx < -doctorW * 2 || sx > W + doctorW * 2) return;
  }

  const bounce = Math.abs(Math.sin(doctor.bouncePhase)) * H * 0.01;
  dy -= bounce;

  if (doctorDancing) {
    dy += Math.sin(elapsed * 10) * H * 0.02;
    rot = Math.sin(elapsed * 8) * 0.18;
  }

  ctx.save();
  ctx.translate(sx + doctorW / 2, dy + doctorH / 2);
  ctx.rotate(rot);

  if (imgReady("doctor")) {
    ctx.drawImage(images.doctor, -doctorW / 2, -doctorH / 2, doctorW, doctorH);
  } else {
    // REPLACE: doctor sprite — white rectangle w/ red cross, labeled DR. BANDSCHEIBE
    ctx.fillStyle = "#ffffff";
    roundRect(-doctorW / 2, -doctorH / 2, doctorW, doctorH, doctorW * 0.25);
    ctx.fill();
    ctx.strokeStyle = "#c9c9c9";
    ctx.lineWidth = 2;
    roundRect(-doctorW / 2, -doctorH / 2, doctorW, doctorH, doctorW * 0.25);
    ctx.stroke();

    const cw = doctorW * 0.28, cl = doctorH * 0.4;
    ctx.fillStyle = "#e63946";
    ctx.fillRect(-cw / 2, -cl / 2, cw, cl);
    ctx.fillRect(-cl / 2, -cw / 2, cl, cw);

    ctx.fillStyle = "#333";
    ctx.font = "bold " + (doctorW * 0.15) + "px 'Playfair Display', serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.save();
    ctx.rotate(-Math.PI / 2);
    ctx.fillText("DR. BANDSCHEIBE", 0, -doctorH * 0.35);
    ctx.restore();
  }
  ctx.restore();

  if (signScale > 0.01) {
    drawSign(sx + doctorW / 2, dy, signScale);
  }

  if (doctorDancing) {
    ctx.font = (doctorW * 0.4) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("🎵", sx + doctorW / 2 + Math.sin(elapsed * 6) * 10, dy - H * 0.02);
  }
}

function render() {
  drawBackground();
  drawGroundAndGrid();
  drawObstacles();
  drawItems();
  drawDoctor();
  drawPlayer();
  drawParticles();
  drawVignette();
}

/* ============================================================
   MAIN LOOP
   ============================================================ */
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(0.05, (ts - lastTime) / 1000 || 0);
  lastTime = ts;

  if (state === "intro") updateIntro(dt);
  else if (state === "playing") update(dt);
  updateParticles(dt);

  if (state === "intro" || state === "playing") {
    render();
    requestAnimationFrame(loop);
  } else if (state === "gameover") {
    render();
  }
}
</script>
