<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Happy Birthday Platformer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,700&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #2b1d10;
    font-family: 'Playfair Display', Georgia, serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #gameCanvas {
    position: fixed;
    inset: 0;
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    background: #e8d7ae;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 2.4vh, 22px);
    text-align: center;
    padding: 6vh 6vw;
    background:
      radial-gradient(circle at 50% 35%, #f2e2bd 0%, #d9c39a 45%, #8a6a42 100%);
    color: #2b1a0d;
    transition: opacity 0.25s ease;
  }
  .overlay.hidden { display: none; }

  #splashScreen {
    z-index: 22;
    background: #14100a;
  }
  #splashVideo {
    max-width: 92vw;
    max-height: 68vh;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #splashScreen p {
    color: #f2e2bd;
    background: rgba(255,255,255,0.12);
  }

  .overlay h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 6.6vw, 3.1rem);
    margin: 0;
    line-height: 1.25;
    text-shadow: 0 2px 0 rgba(255,255,255,0.3);
  }
  .overlay p {
    font-size: clamp(1.1rem, 3.8vw, 1.55rem);
    margin: 0;
    font-weight: 500;
    opacity: 0.9;
  }
  .controlsHint {
    font-family: 'Special Elite', monospace;
    font-size: clamp(0.85rem, 2.6vw, 1.05rem) !important;
    opacity: 0.85 !important;
    background: rgba(43,26,13,0.1);
    border: 1px solid rgba(43,26,13,0.3);
    padding: 0.5em 1em;
    border-radius: 4px;
  }
  .controlsHint.newHighscore {
    color: #7a2530 !important;
    font-weight: 700 !important;
    background: rgba(201,162,74,0.25);
    border-color: #c9a24a;
    opacity: 1 !important;
  }

  .bigBtn {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5.6vw, 2.3rem);
    font-weight: 900;
    color: #f2e2bd;
    background: #5c3a20;
    border: 3px solid #2b1a0d;
    border-radius: 6px;
    padding: 0.6em 1.6em;
    box-shadow: 0 6px 0 #2b1a0d, 0 8px 14px rgba(0,0,0,0.35);
    cursor: pointer;
    touch-action: manipulation;
    transform: translateY(0);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .bigBtn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 #2b1a0d, 0 2px 6px rgba(0,0,0,0.35);
  }

  #hud {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 0; right: 0;
    z-index: 15;
    display: flex;
    justify-content: center;
    pointer-events: none;
  }
  #hud.hidden { display: none; }
  #hud .pill {
    font-family: 'Playfair Display', serif;
    background: rgba(43,26,13,0.75);
    color: #f2e2bd;
    font-weight: 700;
    font-size: clamp(1.2rem, 4.6vw, 1.7rem);
    padding: 0.4em 1.1em;
    border-radius: 6px;
    border: 1px solid rgba(242,226,189,0.4);
  }

  #eggMessage {
    position: fixed;
    inset: 0;
    z-index: 25;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #eggMessage.show { opacity: 1; }
  #eggMessage span {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 7.5vw, 3.6rem);
    font-weight: 900;
    color: #2b1a0d;
    background: rgba(242,226,189,0.92);
    border: 3px solid #2b1a0d;
    border-radius: 8px;
    text-align: center;
    padding: 0.4em 0.8em;
    margin: 0 8vw;
    animation: eggPop 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes eggPop {
    0% { transform: scale(0.4) rotate(-6deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  #flashOverlay {
    position: fixed;
    inset: 0;
    z-index: 24;
    background: #fff8e0;
    opacity: 0;
    pointer-events: none;
  }
  #flashOverlay.flash { animation: flashAnim 0.7s ease-out; }
  @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

  #egg26Panel {
    margin-top: 4px;
    padding: 12px 16px;
    border-radius: 4px;
    background: rgba(255,255,255,0.35);
    border: 3px double #7a2530;
    box-shadow: 0 0 0 4px #f2e2bd inset;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    max-width: 80vw;
  }
  #egg26Panel.show { display: flex; }
  #egg26PhotoBox {
    width: min(64vw, 320px);
    height: min(64vw, 320px);
    border-radius: 4px;
    background: linear-gradient(135deg, #d9c39a, #f2e2bd);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    overflow: hidden;
  }
  #egg26PhotoBox img, #egg26PhotoBox video { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" class="hidden"><div class="pill">Punkte: <span id="scoreDisplay">0</span></div></div>

<div id="flashOverlay"></div>
<div id="eggMessage"><span id="eggMessageText"></span></div>

<div id="splashScreen" class="overlay">
  <video id="splashVideo" src="assets/silly_walk.mp4" playsinline></video>
  <p class="controlsHint" id="splashHint">Tippen zum Start (mit Ton)</p>
</div>

<div id="startScreen" class="overlay hidden">
  <h1>Happy Birthday, <span id="nameSpan"></span>!</h1>
  <p>Escape the Doctor</p>
  <button id="startBtn" class="bigBtn">START</button>
  <p class="controlsHint">Oben tippen = Springen &nbsp;|&nbsp; Unten halten = Ducken</p>
  <p class="controlsHint" id="startHighscore">Highscore: 0</p>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <h1>Game Over</h1>
  <p>Sie haben einen Bandscheibenvorfall...</p>
  <p id="finalScore">Punkte: 0</p>
  <p class="controlsHint" id="gameOverHighscore">Highscore: 0</p>
  <div id="egg26Panel">
    <div id="egg26PhotoBox"></div>
    <p style="margin:0;font-weight:800;color:#7a2530;">Alles Gute zum 26., Katalin!</p>
  </div>
  <button id="retryBtn" class="bigBtn">Nochmal?</button>
</div>

<script>
"use strict";

/* ============================================================
   CONFIG — swap the name here, everything else updates itself
   ============================================================ */
const NAME_PLACEHOLDER = "Katalin";
document.getElementById("nameSpan").textContent = NAME_PLACEHOLDER;

/* ============================================================
   HIGHSCORE — saved locally per browser/device, no backend needed
   ============================================================ */
const HIGHSCORE_KEY = "katGameHighscore";
function getHighscore() {
  return parseInt(localStorage.getItem(HIGHSCORE_KEY) || "0", 10);
}
function setHighscore(v) {
  try { localStorage.setItem(HIGHSCORE_KEY, String(v)); } catch (e) {}
}
function refreshHighscoreDisplay() {
  document.getElementById("startHighscore").textContent = "Highscore: " + getHighscore();
}
refreshHighscoreDisplay();

/* ============================================================
   Sprite / photo loading. Vintage Victorian-engraving cut-out
   art (Monty Python's Flying Circus style). Falls back to simple
   drawn shapes if an image hasn't loaded yet.
   ============================================================ */
const images = {};
function loadImage(key, src) {
  const img = new Image();
  img.src = src;
  images[key] = img;
  return img;
}
function imgReady(key) {
  const img = images[key];
  return img && img.complete && img.naturalWidth > 0;
}
function aspectOf(key, fallback) {
  const img = images[key];
  return (img && img.naturalWidth) ? img.naturalWidth / img.naturalHeight : fallback;
}

loadImage('player', 'assets/player.png'); // full-body photo cut-out
loadImage('doctor', 'assets/doctor.png');
loadImage('cake', 'assets/cake.png');
loadImage('gift', 'assets/gift.png');
loadImage('street', 'assets/street.png');
loadImage('sun', 'assets/sun.png');
loadImage('moon', 'assets/moon.png');
loadImage('head1_zu', 'assets/Head_1_zu.png');
loadImage('head1_offen', 'assets/Head_1_offen.png');
loadImage('head2', 'assets/Head_2.png');
loadImage('bike', 'assets/bike.png');
// REPLACE: no dedicated 26th-birthday photo yet — drop one in and uncomment:
// loadImage('birthday26', 'assets/birthday26.jpg');

const GROUND_OBSTACLE_KEYS = ['ground_scroll', 'ground_rockface', 'ground_books', 'ground_bathtub'];
const OVERHANG_OBSTACLE_KEYS = ['overhang_stethoscope', 'overhang_chandelier', 'overhang_pocketwatch', 'overhang_skeleton', 'overhang_bunting'];
for (const k of GROUND_OBSTACLE_KEYS) loadImage(k, 'assets/' + k + '.png');
for (const k of OVERHANG_OBSTACLE_KEYS) loadImage(k, 'assets/' + k + '.png');

const BG_LAYER_KEYS = ['background_1', 'background_2', 'background_3'];
for (const k of BG_LAYER_KEYS) loadImage(k, 'assets/' + k + '.png');
const PEEK_HEAD_KEYS = ['peekhead_1', 'peekhead_2', 'peekhead_3', 'peekhead_4', 'peekhead_5'];
for (const k of PEEK_HEAD_KEYS) loadImage(k, 'assets/' + k + '.png');

/* ============================================================
   SPLASH VIDEO — plays once on page load, then reveals Start
   ============================================================ */
(function setupSplash() {
  const splash = document.getElementById('splashScreen');
  const video = document.getElementById('splashVideo');
  const hint = document.getElementById('splashHint');
  let started = false;
  let dismissed = false;
  function dismiss() {
    if (dismissed) return;
    dismissed = true;
    splash.classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
    try { video.pause(); } catch (e) {}
  }
  // browsers only allow audible playback after a real user gesture, so we
  // deliberately don't autoplay here — the first tap both starts the video
  // AND counts as that gesture, so sound plays reliably instead of the
  // silent-autoplay fallback.
  splash.addEventListener('pointerdown', () => {
    if (!started) {
      started = true;
      hint.textContent = 'Tippen zum Überspringen';
      video.muted = false;
      video.play().catch(() => {});
    } else {
      dismiss();
    }
  });
  video.addEventListener('ended', dismiss);
  video.addEventListener('error', dismiss);
  setTimeout(dismiss, 25000); // safety net in case nobody ever taps
})();

/* ============================================================
   CANVAS / RESPONSIVE SETUP
   ============================================================ */
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let W = window.innerWidth;
let H = window.innerHeight;

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", resizeCanvas);
resizeCanvas();

function groundY() { return H * 0.78; }

/* ============================================================
   GAME STATE
   ============================================================ */
let state = "start"; // 'start' | 'intro' | 'playing' | 'caught' | 'gameover'
let secretUnlocked = false;
let typedBuffer = "";
let score = 0;
let elapsed = 0;
let cameraX = 0;
let scrollSpeed = 0;
let egg1307Fired = false;
let doctorDancing = false;
let doctorDanceEnd = 0;
let introTimer = 0;

let bikePowerupFired = false;
let bikeActive = false;
let bikeEndTime = 0;
const BIKE_TRIGGER_SCORE = 11; // "ab ca. 10-12 Punkten"
const BIKE_DURATION = 7;       // seconds of clear straight-track riding
const BIKE_SPEED_MULT = 1.4;

// "caught" — a brief freeze-frame where the doctor rushes in and grabs her
// before the Game Over screen appears, instead of cutting to it instantly
let caughtTimer = 0;
let catchDoctorStartX = 0;
let catchWorldX = 0;
const CAUGHT_DURATION = 1.1;

const PLAYER_SCREEN_X_RATIO = 0.24;

// total on-screen height of the player sprite (bigger = easier to see)
const PLAYER_STAND_H = () => H * 0.20;
const PLAYER_DUCK_H = () => H * 0.14;

const player = {
  hoverY: 0, vy: 0,          // hoverY = height above ground baseline
  jumpsUsed: 0,
  grounded: true,
  duckHeld: false,
  mouthOpenUntil: 0,
  sparkleUntil: 0,
  runPhase: 0,
};

function playerHeight() {
  return player.duckHeld ? PLAYER_DUCK_H() : PLAYER_STAND_H();
}
function playerWidth() {
  return playerHeight() * aspectOf('player', 600 / 900);
}

const doctor = {
  screenX: -9999,   // used only during intro (absolute screen space)
  worldX: 0,
  bouncePhase: 0,
  signScale: 0,
};

function doctorSize() {
  const height = H * 0.19;
  const width = height * aspectOf('doctor', 0.5625);
  return { width, height };
}

let obstacles = [];   // {type:'rock'|'overhang', x, width, spriteKey, [height]}
let items = [];        // {kind:'cake'|'gift', x, y, size, collected}
let particles = [];
let spawnCursor = 0;

const OVERHANG_BOTTOM_RATIO = 0.635; // fraction of H; must duck under this
const ROCK_HEIGHT = () => H * 0.105; // must be well under max jump apex (~0.184H)

// head-gate — a big head you simply run through the open mouth of. Standing
// height clears it with room to spare and ducking obviously does too; only
// jumping raises her into the danger zone. Danger zone is intentionally a
// SUBSET of the (much taller) visual, never bigger than what's drawn.
const HEADGATE_DANGER_BOTTOM = () => H * 0.50;
const HEADGATE_VISUAL_HEIGHT = () => H * 0.62;
const HEAD1_TRIGGER_SCORE = 12;   // one-off, appears once
const HEAD2_INTERVAL = 15;
let head1Fired = false;
let nextHead2Score = HEAD1_TRIGGER_SCORE + HEAD2_INTERVAL; // 27, then 42, 57, ...
// vertical center of each mouth cavity within its own image (measured),
// used to anchor the gate on the actual passage rather than the image top
const MOUTH_CENTER_FRAC = { head1_zu: 0.64, head1_offen: 0.64, head2: 0.66 };

// Obstacles hitbox is narrower than the icon on purpose (easier gameplay),
// but the icon itself is drawn full-size and centered over that hitbox —
// visually nothing shrinks, only the invisible danger zone does.
const OBSTACLE_WIDTH_SCALE = 0.72;

function groundObstacleSize(spriteKey) {
  const height = ROCK_HEIGHT();
  const drawWidth = height * aspectOf(spriteKey, 1);
  const width = drawWidth * OBSTACLE_WIDTH_SCALE;
  return { width, height, drawWidth };
}
function overhangObstacleSize(spriteKey) {
  // height is ALWAYS the full duck-threshold so the visual sprite exactly
  // matches the collision zone — never shrink height to cap width, or the
  // hitbox silently extends below where the sprite is actually drawn.
  const height = H * OVERHANG_BOTTOM_RATIO;
  const drawWidth = height * aspectOf(spriteKey, 0.6);
  const width = drawWidth * OBSTACLE_WIDTH_SCALE;
  return { width, height, drawWidth };
}

/* ============================================================
   AUDIO — tiny WebAudio jingles, no external files
   ============================================================ */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  return audioCtx;
}
function playTone(freq, startTime, duration, type = "sine", vol = 0.18) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain).connect(ac.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}
function playJingle() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    const notes = [523.25, 587.33, 659.25, 783.99, 659.25, 880.00];
    notes.forEach((f, i) => playTone(f, t0 + i * 0.16, 0.3, "triangle"));
  } catch (e) { /* audio not available, ignore */ }
}
function playChime() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    [660, 880, 1108].forEach((f, i) => playTone(f, t0 + i * 0.09, 0.35, "sine", 0.14));
  } catch (e) {}
}
function playStinger() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    // comedic "dun dun DUUUN" descending sting for the intro cutscene
    [392, 349.23, 261.63].forEach((f, i) => playTone(f, t0 + i * 0.32, i === 2 ? 0.9 : 0.28, "sawtooth", 0.12));
  } catch (e) {}
}
function playBikeBell() {
  try {
    const ac = getAudioCtx();
    const t0 = ac.currentTime;
    [1568, 1976, 1568, 1976].forEach((f, i) => playTone(f, t0 + i * 0.11, 0.2, "square", 0.10));
  } catch (e) {}
}

/* ============================================================
   INPUT — top half of screen = jump (tap), bottom half = duck (hold)
   ============================================================ */
function tryJump() {
  if (state !== "playing") return;
  const maxJumps = secretUnlocked ? Infinity : 2; // everyone gets a double jump; the secret grants unlimited
  if (player.grounded || player.jumpsUsed < maxJumps) {
    const isExtraJump = !player.grounded && player.jumpsUsed >= 1;
    player.vy = isExtraJump ? H * 0.80 : H * 1.15; // the follow-up hop is a bit weaker than the first
    player.jumpsUsed += 1;
    player.grounded = false;
    player.duckHeld = false;
  }
}
function startDuck() { if (state === "playing") player.duckHeld = true; }
function endDuck() { player.duckHeld = false; }

canvas.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  if (state !== "playing") return;
  const rect = canvas.getBoundingClientRect();
  const y = e.clientY - rect.top;
  if (y > H * 0.5) startDuck(); else tryJump();
});
canvas.addEventListener("pointerup", (e) => { e.preventDefault(); endDuck(); });
canvas.addEventListener("pointercancel", () => endDuck());
canvas.addEventListener("pointerleave", () => endDuck());

window.addEventListener("keydown", (e) => {
  if (["Space", "ArrowUp", "ArrowDown", "KeyS"].includes(e.code)) e.preventDefault();
  if (state === "start") {
    if (/^[a-zA-Z]$/.test(e.key)) {
      typedBuffer = (typedBuffer + e.key.toUpperCase()).slice(-20);
      if (typedBuffer.includes("GEBURTSTAG")) secretUnlocked = true; // silent easter egg, no on-screen hint
    }
  } else if (state === "playing") {
    if (e.code === "Space" || e.code === "ArrowUp") tryJump();
    if (e.code === "ArrowDown" || e.code === "KeyS") startDuck();
  }
}, { passive: false });

window.addEventListener("keyup", (e) => {
  if (e.code === "ArrowDown" || e.code === "KeyS") endDuck();
});

document.getElementById("startBtn").addEventListener("click", beginIntro);
document.getElementById("retryBtn").addEventListener("click", beginIntro);

/* ============================================================
   BACKGROUND — real illustrated parallax mountains + peeking heads
   ============================================================ */
function drawBgLayer(key, targetHeight, parallax, baselineY) {
  const img = images[key];
  if (!img || !img.complete || !img.naturalWidth) return;
  const aspect = img.naturalWidth / img.naturalHeight;
  const h = targetHeight;
  const w = h * aspect;
  const offset = (cameraX * parallax) % w;
  const count = Math.ceil(W / w) + 2;
  for (let i = -1; i <= count; i++) {
    ctx.drawImage(img, -offset + i * w, baselineY - h, w, h);
  }
}

let peek = { active: false, key: null, x: 0, timer: 2 + Math.random() * 3 };
function updatePeek(dt) {
  peek.timer -= dt;
  if (peek.timer <= 0) {
    if (peek.active) {
      peek.active = false;
      peek.timer = 3 + Math.random() * 5;
    } else {
      peek.active = true;
      peek.key = PEEK_HEAD_KEYS[(Math.random() * PEEK_HEAD_KEYS.length) | 0];
      peek.x = W * (0.15 + Math.random() * 0.7);
      peek.timer = 1.8 + Math.random() * 1.4;
    }
  }
}
function drawPeek() {
  if (!peek.active || !imgReady(peek.key)) return;
  const img = images[peek.key];
  const aspect = img.naturalWidth / img.naturalHeight;
  const h = H * 0.12;
  const w = h * aspect;
  const y = groundY() - H * 0.36 + Math.sin(elapsed * 2) * H * 0.006;
  ctx.drawImage(img, peek.x - w / 2, y - h, w, h);
}

/* ============================================================
   DAY / NIGHT CYCLE — toggles every 26 points, eased crossfade
   ============================================================ */
let nightAmount = 0; // 0 = full day, 1 = full night
function updateDayNight(dt) {
  const target = Math.floor(score / 26) % 2; // 0,1,0,1... every 26 points
  const rate = 0.6; // fraction per second — ~1.7s to fully cross-fade
  if (nightAmount < target) nightAmount = Math.min(target, nightAmount + rate * dt);
  else if (nightAmount > target) nightAmount = Math.max(target, nightAmount - rate * dt);
}
function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}
const NIGHT_STARS = (() => {
  let s = 7;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const arr = [];
  for (let i = 0; i < 50; i++) arr.push({ xf: rand(), yf: rand() * 0.6, r: 1 + rand() * 1.5, phase: rand() * Math.PI * 2 });
  return arr;
})();
function drawStars(alpha) {
  for (const s of NIGHT_STARS) {
    const tw = 0.5 + 0.5 * Math.abs(Math.sin(elapsed * 1.5 + s.phase));
    ctx.globalAlpha = alpha * tw;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(s.xf * W, s.yf * groundY(), s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

const SKY_DAY = { top: [217, 196, 156], mid: [232, 215, 174], bot: [240, 226, 189] };
const SKY_NIGHT = { top: [18, 17, 38], mid: [30, 27, 58], bot: [48, 42, 78] };

function drawBackground() {
  const n = nightAmount;
  // aged parchment sky by day, deep indigo by night — smoothly lerped
  const top = lerpColor(SKY_DAY.top, SKY_NIGHT.top, n);
  const mid = lerpColor(SKY_DAY.mid, SKY_NIGHT.mid, n);
  const bot = lerpColor(SKY_DAY.bot, SKY_NIGHT.bot, n);
  const sky = ctx.createLinearGradient(0, 0, 0, groundY());
  sky.addColorStop(0, `rgb(${top[0]},${top[1]},${top[2]})`);
  sky.addColorStop(0.55, `rgb(${mid[0]},${mid[1]},${mid[2]})`);
  sky.addColorStop(1, `rgb(${bot[0]},${bot[1]},${bot[2]})`);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, groundY());

  if (n > 0.02) drawStars(n);

  // sun by day, moon by night — cross-fades as nightAmount changes
  const sunX = W * 0.82, sunY = H * 0.18, sunR = H * 0.06;
  const d = sunR * 3.4;
  if (n < 0.98 && imgReady('sun')) {
    ctx.globalAlpha = 1 - n;
    ctx.drawImage(images.sun, sunX - d / 2, sunY - d / 2, d, d);
    ctx.globalAlpha = 1;
  }
  if (n > 0.02 && imgReady('moon')) {
    ctx.globalAlpha = n;
    ctx.drawImage(images.moon, sunX - d / 2, sunY - d / 2, d, d);
    ctx.globalAlpha = 1;
  }
  if (!imgReady('sun') && !imgReady('moon')) {
    // REPLACE: sun/moon placeholder — simple engraved-look disc with rays
    ctx.strokeStyle = "rgba(90,60,30,0.4)";
    ctx.lineWidth = Math.max(1.5, H * 0.003);
    for (let i = 0; i < 16; i++) {
      const a = (i / 16) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(sunX + Math.cos(a) * sunR * 1.15, sunY + Math.sin(a) * sunR * 1.15);
      ctx.lineTo(sunX + Math.cos(a) * sunR * 1.7, sunY + Math.sin(a) * sunR * 1.7);
      ctx.stroke();
    }
    ctx.fillStyle = "#f3e2b0";
    ctx.beginPath();
    ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#8a6a3f";
    ctx.lineWidth = Math.max(2, H * 0.004);
    ctx.stroke();
  }

  // real illustrated mountain ranges, back to front
  drawBgLayer('background_1', H * 0.42, 0.12, groundY() + H * 0.01);
  drawBgLayer('background_2', H * 0.50, 0.24, groundY() + H * 0.015);
  drawPeek();
  drawBgLayer('background_3', H * 0.58, 0.40, groundY() + H * 0.02);

  // haze near the mountain base
  const mist = ctx.createLinearGradient(0, groundY() - H * 0.12, 0, groundY());
  mist.addColorStop(0, "rgba(235,215,175,0)");
  mist.addColorStop(1, "rgba(235,215,175,0.4)");
  ctx.fillStyle = mist;
  ctx.fillRect(0, groundY() - H * 0.12, W, H * 0.12);

  // night tint over the mountains/mist for a cohesive dusk-to-night mood
  if (n > 0.02) {
    ctx.fillStyle = `rgba(10,8,28,${(n * 0.45).toFixed(2)})`;
    ctx.fillRect(0, 0, W, groundY() + H * 0.05);
  }
}

function drawGroundAndGrid() {
  const gy = groundY();
  if (imgReady('street')) {
    const img = images.street;
    const aspect = img.naturalWidth / img.naturalHeight;
    // the street illustration has tall bollard posts, so the walkable
    // surface sits well below the image's own top edge (~41% down) —
    // anchor on that surface line, not the bounding-box top, or the
    // ground looks like it's floating with a gap above it
    const surfaceFrac = 0.41;
    const h = (H - gy) / (1 - surfaceFrac);
    const w = h * aspect;
    const drawTop = gy - h * surfaceFrac;
    const offset = cameraX % w; // full speed — this IS the ground plane
    const count = Math.ceil(W / w) + 2;
    for (let i = -1; i <= count; i++) {
      ctx.drawImage(img, -offset + i * w, drawTop, w, h);
    }
  } else {
    // REPLACE: floor placeholder — flat gradient
    const floor = ctx.createLinearGradient(0, gy, 0, H);
    floor.addColorStop(0, "#7a5c3a");
    floor.addColorStop(1, "#43301d");
    ctx.fillStyle = floor;
    ctx.fillRect(0, gy, W, H - gy);
    ctx.fillStyle = "#2f2213";
    ctx.fillRect(0, gy, W, Math.max(2, H * 0.006));
  }
  if (nightAmount > 0.02) {
    ctx.fillStyle = `rgba(8,6,20,${(nightAmount * 0.5).toFixed(2)})`;
    ctx.fillRect(0, gy, W, H - gy);
  }
}

function drawVignette() {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.95);
  g.addColorStop(0, "rgba(35,22,10,0)");
  g.addColorStop(1, "rgba(35,22,10,0.38)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

/* ============================================================
   OBSTACLE / ITEM GENERATION
   ============================================================ */
function resetWorld() {
  obstacles = [];
  items = [];
  particles = [];
  spawnCursor = H * 1.2;
}

function generateAhead() {
  while (spawnCursor < cameraX + W * 1.6 + H * 1.5) {
    const gap = H * (0.55 + Math.random() * 0.5);
    spawnCursor += gap;

    if (!bikeActive) {
      const roll = Math.random();
      if (roll < 0.4) {
        const spriteKey = GROUND_OBSTACLE_KEYS[(Math.random() * GROUND_OBSTACLE_KEYS.length) | 0];
        const { width, drawWidth } = groundObstacleSize(spriteKey);
        const x = spawnCursor + (drawWidth - width) / 2; // hitbox centered under the full-size icon
        obstacles.push({ type: "rock", x, width, drawWidth, spriteKey });
        spawnCursor += drawWidth;
      } else if (roll < 0.75) {
        const spriteKey = OVERHANG_OBSTACLE_KEYS[(Math.random() * OVERHANG_OBSTACLE_KEYS.length) | 0];
        const { width, height, drawWidth } = overhangObstacleSize(spriteKey);
        const x = spawnCursor + (drawWidth - width) / 2;
        obstacles.push({ type: "overhang", x, width, height, drawWidth, spriteKey, wobble: Math.random() * Math.PI * 2 });
        spawnCursor += drawWidth;
      }
    }

    // sprinkle a collectible in the clear stretch that follows
    if (Math.random() < 0.8) {
      const itemGap = H * (0.13 + Math.random() * 0.2);
      const ix = spawnCursor + itemGap;
      const size = H * 0.055;
      const arcHeight = Math.random() < 0.4 ? H * 0.20 : 0;
      items.push({
        kind: Math.random() < 0.55 ? "cake" : "gift",
        x: ix, size,
        y: groundY() - size - arcHeight,
        collected: false,
      });
      spawnCursor = ix + size;
    }
    spawnCursor += H * 0.06;
  }
}

function spawnHeadGate(variant) {
  const playerScreenX = W * PLAYER_SCREEN_X_RATIO;
  const leadDistance = H * 1.4; // enough runway to see it coming
  const spawnX = cameraX + playerScreenX + leadDistance;
  const height = HEADGATE_VISUAL_HEIGHT();
  const spriteKey = variant === "head1" ? "head1_zu" : "head2";
  const width = height * aspectOf(spriteKey, 0.8);
  // clear a clean approach so a procedurally-generated obstacle can't
  // overlap this scripted one
  obstacles = obstacles.filter(o => o.x < spawnX - width || o.x > spawnX + width * 2);
  obstacles.push({
    type: "headgate", variant, x: spawnX, width, drawWidth: width, height,
    spriteKey, opened: variant !== "head1",
  });
  spawnCursor = Math.max(spawnCursor, spawnX + width * 2.2);
}

function pruneBehindCamera() {
  obstacles = obstacles.filter(o => o.x + o.width / 2 + o.drawWidth / 2 > cameraX - W * 0.3);
  items = items.filter(it => !it.collected && it.x + it.size > cameraX - W * 0.3);
}

/* ============================================================
   RESET / START / INTRO
   ============================================================ */
function resetGame() {
  score = 0;
  elapsed = 0;
  cameraX = 0;
  scrollSpeed = H * 0.58;
  egg1307Fired = false;
  doctorDancing = false;
  bikePowerupFired = false;
  bikeActive = false;
  nightAmount = 0;
  head1Fired = false;
  nextHead2Score = HEAD1_TRIGGER_SCORE + HEAD2_INTERVAL;
  particles = [];

  player.hoverY = 0;
  player.vy = 0;
  player.jumpsUsed = 0;
  player.grounded = true;
  player.duckHeld = false;
  player.mouthOpenUntil = 0;
  player.sparkleUntil = 0;

  doctor.worldX = cameraX + W * PLAYER_SCREEN_X_RATIO - H * 0.62;

  resetWorld();
  generateAhead();
  updateScoreDisplay();
}

function beginIntro() {
  resetGame();
  state = "intro";
  introTimer = 0;
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("gameOverScreen").classList.add("hidden");
  document.getElementById("egg26Panel").classList.remove("show");
  document.getElementById("hud").classList.add("hidden");
  try { getAudioCtx().resume(); } catch (e) {}
  playStinger();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function startPlaying() {
  state = "playing";
  document.getElementById("hud").classList.remove("hidden");
}

function triggerCatch() {
  if (state !== "playing") return;
  state = "caught";
  caughtTimer = 0;
  catchDoctorStartX = doctor.worldX;
  catchWorldX = cameraX + W * PLAYER_SCREEN_X_RATIO; // where she was standing when caught
  doctorDancing = false;
}

function updateCaught(dt) {
  caughtTimer += dt;
  const t = Math.min(1, caughtTimer / CAUGHT_DURATION);
  const eased = 1 - Math.pow(1 - t, 3); // ease-out — fast lunge, settles at the end
  doctor.worldX = catchDoctorStartX + (catchWorldX - catchDoctorStartX) * eased;
  doctor.bouncePhase += dt * 10;
  if (t === 1 && caughtTimer - dt < CAUGHT_DURATION) {
    spawnSparkle(W * PLAYER_SCREEN_X_RATIO + playerWidth() / 2, groundY() - playerHeight(), 16);
  }
  if (caughtTimer >= CAUGHT_DURATION) finalizeGameOver();
}

function finalizeGameOver() {
  state = "gameover";
  document.getElementById("hud").classList.add("hidden");
  document.getElementById("eggMessage").classList.remove("show");
  document.getElementById("finalScore").textContent = "Punkte: " + score;
  const prevHighscore = getHighscore();
  const isNewHighscore = score > prevHighscore;
  if (isNewHighscore) setHighscore(score);
  const gameOverHighscoreEl = document.getElementById("gameOverHighscore");
  gameOverHighscoreEl.textContent = isNewHighscore ? "Neuer Highscore!" : "Highscore: " + prevHighscore;
  gameOverHighscoreEl.classList.toggle("newHighscore", isNewHighscore);
  refreshHighscoreDisplay();
  const panel = document.getElementById("egg26Panel");
  const box = document.getElementById("egg26PhotoBox");
  if (score >= 26) {
    panel.classList.add("show");
    box.innerHTML = '<video src="assets/Monty_Happy_Birthday.mp4" loop playsinline ' +
      'style="cursor:pointer;" onclick="this.muted = !this.muted;"></video>';
    // by now the player has tapped/clicked many times, so sound is almost
    // always allowed — but fall back to muted if the browser still blocks it
    const eggVideo = box.querySelector('video');
    eggVideo.muted = false;
    const playAttempt = eggVideo.play();
    if (playAttempt && playAttempt.catch) {
      playAttempt.catch(() => { eggVideo.muted = true; eggVideo.play().catch(() => {}); });
    }
    spawnConfetti(140);
    playChime();
  } else {
    panel.classList.remove("show");
    box.innerHTML = "";
  }
  document.getElementById("gameOverScreen").classList.remove("hidden");
}

function updateScoreDisplay() {
  document.getElementById("scoreDisplay").textContent = score;
}

/* ============================================================
   EASTER EGGS & PARTICLES
   ============================================================ */
function showEggMessage(text, ms) {
  const el = document.getElementById("eggMessage");
  document.getElementById("eggMessageText").textContent = text;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), ms);
}

function triggerEgg1307() {
  egg1307Fired = true;
  doctorDancing = true;
  doctorDanceEnd = elapsed + 10;
  playJingle();
  showEggMessage("DR. BANDSCHEIBE TANZT!", 2200);
}

function triggerBikePowerup() {
  bikePowerupFired = true;
  bikeActive = true;
  bikeEndTime = elapsed + BIKE_DURATION;
  // clear the track ahead for a clean straight ride
  obstacles = obstacles.filter(o => o.x < cameraX);
  playBikeBell();
  showEggMessage("YOU GET MARK CAVENDISH!!", 2200);
}

function spawnConfetti(n) {
  const colors = ["#7a2530", "#c9a24a", "#5c3a20", "#8a6a42", "#f2e2bd", "#3a6b4a"];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: W * (0.2 + Math.random() * 0.6),
      y: -Math.random() * H * 0.3,
      vx: (Math.random() - 0.5) * W * 0.4,
      vy: H * (0.15 + Math.random() * 0.35),
      size: H * (0.012 + Math.random() * 0.014),
      color: colors[(Math.random() * colors.length) | 0],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 8,
      life: 3 + Math.random(),
    });
  }
}
function spawnSparkle(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = H * (0.2 + Math.random() * 0.3);
    particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - H * 0.1,
      size: H * 0.010, color: "#c9a24a",
      rot: 0, vr: 0, life: 0.5 + Math.random() * 0.3,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += H * 0.9 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.vr * dt;
    p.life -= dt;
    if (p.life <= 0 || p.y > H + 40) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    ctx.restore();
  }
}

/* ============================================================
   MAIN UPDATE
   ============================================================ */
function aabbOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function updateIntro(dt) {
  introTimer += dt;
  player.runPhase += dt * 4;

  // centered so the sign always has room, regardless of viewport width
  const restX = W * 0.5 - H * 0.045;

  if (introTimer < 0.55) {
    const t = introTimer / 0.55;
    doctor.screenX = -W * 0.3 + (restX + W * 0.3) * (1 - Math.pow(1 - t, 3));
    doctor.signScale = Math.max(0, (t - 0.5) * 2);
  } else if (introTimer < 2.15) {
    doctor.screenX = restX;
    doctor.signScale = Math.min(1, doctor.signScale + dt * 6);
  } else if (introTimer < 2.65) {
    const t = (introTimer - 2.15) / 0.5;
    doctor.screenX = restX - (restX + W * 0.35) * t;
    doctor.signScale = Math.max(0, 1 - t * 1.4);
  } else {
    startPlaying();
  }
}

function update(dt) {
  elapsed += dt;

  if (bikeActive && elapsed >= bikeEndTime) bikeActive = false;

  // speed is H-based (not W-based) so obstacle-clear timing stays fair
  // regardless of the device's screen aspect ratio (portrait vs desktop)
  const baseSpeed = Math.min(H * 1.15, H * 0.58 + elapsed * H * 0.010);
  scrollSpeed = bikeActive ? baseSpeed * BIKE_SPEED_MULT : baseSpeed;
  cameraX += scrollSpeed * dt;

  generateAhead();
  pruneBehindCamera();
  updatePeek(dt);
  updateDayNight(dt);

  const playerScreenX = W * PLAYER_SCREEN_X_RATIO;
  const playerWorldX = cameraX + playerScreenX;

  // --- player vertical physics (hover above ground baseline) ---
  const GRAVITY = H * 3.6;
  // fast-fall: holding duck while airborne drops her out of the jump
  // much quicker, so jump→duck feels snappy instead of floaty
  const fallMult = (player.duckHeld && !player.grounded) ? 2.4 : 1;
  player.vy -= GRAVITY * fallMult * dt;
  player.hoverY += player.vy * dt;
  if (player.hoverY <= 0) {
    player.hoverY = 0;
    player.vy = 0;
    player.grounded = true;
    player.jumpsUsed = 0;
  } else {
    player.grounded = false;
  }
  player.runPhase += dt * (5 + scrollSpeed / H * 4);

  const pW = playerWidth();
  const pH = playerHeight();
  const pTop = groundY() - player.hoverY - pH;

  // --- item collection ---
  for (const it of items) {
    if (it.collected) continue;
    const itScreenX = it.x - cameraX;
    if (aabbOverlap(playerScreenX, pTop, pW, pH, itScreenX, it.y, it.size, it.size)) {
      it.collected = true;
      score += 1;
      updateScoreDisplay();
      if (it.kind === "cake") {
        player.mouthOpenUntil = elapsed + 0.35;
        player.sparkleUntil = elapsed + 0.35;
        spawnSparkle(playerScreenX + pW / 2, pTop, 10);
      } else {
        player.sparkleUntil = elapsed + 0.35;
        spawnSparkle(playerScreenX + pW / 2, pTop, 14);
      }
      if (score === 1307 && !egg1307Fired) triggerEgg1307();
      if (score === BIKE_TRIGGER_SCORE && !bikePowerupFired) triggerBikePowerup();
      if (score === HEAD1_TRIGGER_SCORE && !head1Fired) { head1Fired = true; spawnHeadGate("head1"); }
      if (score >= nextHead2Score) { spawnHeadGate("head2"); nextHead2Score += HEAD2_INTERVAL; }
    }
  }

  // --- obstacle collision (skipped entirely during the bike phase) ---
  if (!bikeActive) {
    for (const o of obstacles) {
      const osx = o.x - cameraX;
      if (osx + o.width < -20 || osx > W + 20) continue;
      if (o.type === "rock") {
        const rockH = ROCK_HEIGHT();
        if (aabbOverlap(playerScreenX, pTop, pW, pH, osx, groundY() - rockH, o.width, rockH)) {
          triggerCatch();
          return;
        }
      } else if (o.type === "headgate") {
        // danger zone is only the upper portion — well under the tall
        // visual — so standing/ducking always clears it and only a jump
        // raises her into it
        if (aabbOverlap(playerScreenX, pTop, pW, pH, osx, 0, o.width, HEADGATE_DANGER_BOTTOM())) {
          triggerCatch();
          return;
        }
      } else {
        // uses o.height (the actual drawn height) rather than a global
        // constant, so the hitbox always matches what's on screen
        if (aabbOverlap(playerScreenX, pTop, pW, pH, osx, 0, o.width, o.height)) {
          triggerCatch();
          return;
        }
      }
    }
  }

  // --- doctor AI (chases from behind; falls behind during the bike phase) ---
  if (doctorDancing) {
    if (elapsed >= doctorDanceEnd) doctorDancing = false;
  } else {
    const wobble = Math.sin(elapsed * 0.6) * 0.12;
    const speedMul = 0.80 + Math.min(0.32, elapsed * 0.0016) + wobble;
    doctor.worldX += baseSpeed * speedMul * dt;
  }
  const maxTrailScreen = H * 0.85;
  const minDoctorWorldX = cameraX + playerScreenX - maxTrailScreen;
  if (doctor.worldX < minDoctorWorldX) doctor.worldX = minDoctorWorldX;
  doctor.bouncePhase += dt * 6;

  if (!bikeActive) {
    const doctorScreenX = doctor.worldX - cameraX;
    const { width: doctorW, height: doctorH } = doctorSize();
    const doctorTop = groundY() - doctorH;
    if (aabbOverlap(playerScreenX, pTop, pW, pH, doctorScreenX, doctorTop, doctorW, doctorH)) {
      triggerCatch();
    }
  }
}

/* ============================================================
   RENDER — player, doctor, obstacles, items
   ============================================================ */
function drawObstacles() {
  for (const o of obstacles) {
    const sx = o.x - cameraX;
    const cx = sx + o.width / 2; // shared center of the (narrow) hitbox and the (full-size) icon
    if (cx + o.drawWidth / 2 < -20 || cx - o.drawWidth / 2 > W + 20) continue;
    if (o.type === "rock") {
      const h = ROCK_HEIGHT();
      const top = groundY() - h;
      const drawX = cx - o.drawWidth / 2;
      if (imgReady(o.spriteKey)) {
        ctx.drawImage(images[o.spriteKey], drawX, top, o.drawWidth, h);
      } else {
        ctx.fillStyle = "#8a6a42";
        ctx.fillRect(drawX, top, o.drawWidth, h);
      }
    } else if (o.type === "headgate") {
      // the mouth pops open automatically once she gets close — purely
      // a visual reveal, the passable danger zone never changes
      if (o.variant === "head1" && !o.opened) {
        const worldDist = o.x - (cameraX + W * PLAYER_SCREEN_X_RATIO);
        if (worldDist < H * 0.9) { o.opened = true; o.spriteKey = "head1_offen"; }
      }
      const drawX = cx - o.drawWidth / 2;
      // anchor on the mouth's own center (measured per sprite), not the
      // image's bounding-box top, so the passage lines up with where she
      // actually runs rather than floating high above her
      const mouthFrac = MOUTH_CENTER_FRAC[o.spriteKey] || 0.65;
      const mouthTargetY = HEADGATE_DANGER_BOTTOM() + H * 0.10;
      const drawY = mouthTargetY - mouthFrac * o.height;
      if (imgReady(o.spriteKey)) {
        ctx.drawImage(images[o.spriteKey], drawX, drawY, o.drawWidth, o.height);
      } else {
        ctx.fillStyle = "#5c4a38";
        ctx.fillRect(drawX, drawY, o.drawWidth, o.height);
      }
    } else {
      const sway = Math.sin(elapsed * 2 + o.wobble) * 0.09;
      ctx.save();
      ctx.translate(cx, 0);
      ctx.rotate(sway);
      if (imgReady(o.spriteKey)) {
        ctx.drawImage(images[o.spriteKey], -o.drawWidth / 2, 0, o.drawWidth, o.height);
      } else {
        ctx.fillStyle = "#6b4e2f";
        ctx.fillRect(-o.drawWidth / 2, 0, o.drawWidth, o.height);
      }
      ctx.restore();
    }
  }
}

function drawItems() {
  for (const it of items) {
    if (it.collected) continue;
    const sx = it.x - cameraX;
    if (sx < -it.size || sx > W + it.size) continue;
    const bob = Math.sin(elapsed * 3 + it.x) * H * 0.008;
    if (it.kind === "cake") {
      if (imgReady("cake")) {
        ctx.drawImage(images.cake, sx, it.y + bob, it.size, it.size);
      } else {
        ctx.fillStyle = "#f2e2bd";
        ctx.fillRect(sx, it.y + bob, it.size, it.size);
        ctx.font = (it.size * 0.9) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎂", sx + it.size / 2, it.y + bob + it.size / 2 + 1);
      }
    } else {
      if (imgReady("gift")) {
        ctx.drawImage(images.gift, sx, it.y + bob, it.size, it.size);
      } else {
        ctx.fillStyle = "#7a2530";
        ctx.fillRect(sx, it.y + bob, it.size, it.size);
        ctx.font = (it.size * 0.9) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🎁", sx + it.size / 2, it.y + bob + it.size / 2 + 1);
      }
    }
  }
}

function drawBike(sx, baseY) {
  const bodyW = playerWidth();
  const hubX = sx - bodyW * 0.15;
  if (imgReady('bike')) {
    // real penny-farthing illustration — big wheel sits at ~72% across
    // the image, anchored so that wheel touches the ground at hubX
    const height = playerHeight() * 1.15;
    const width = height * aspectOf('bike', 1);
    ctx.drawImage(images.bike, hubX - width * 0.72, baseY - height, width, height);
  } else {
    // REPLACE: bike sprite placeholder — simple penny-farthing silhouette,
    // drawn behind the player so the big wheel reads as "under/behind her"
    // rather than through her body.
    const wheelR = playerHeight() * 0.34;
    const smallR = wheelR * 0.4;
    ctx.save();
    ctx.strokeStyle = "#2b1a0d";
    ctx.lineWidth = Math.max(2, wheelR * 0.09);
    ctx.beginPath();
    ctx.arc(hubX, baseY - wheelR, wheelR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(hubX - wheelR * 1.15, baseY - smallR, smallR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hubX, baseY - wheelR);
    ctx.lineTo(hubX - wheelR * 1.15, baseY - smallR);
    ctx.lineTo(hubX - wheelR * 0.3, baseY - wheelR * 1.55);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

function drawPlayer() {
  const sx = W * PLAYER_SCREEN_X_RATIO;
  const pH = playerHeight();
  const pW = playerWidth();
  const bounce = player.grounded ? Math.abs(Math.sin(player.runPhase)) * H * 0.008 : 0;
  const baseY = groundY() - player.hoverY - bounce;
  const top = baseY - pH;

  if (bikeActive) drawBike(sx, baseY);

  ctx.save();
  if (imgReady("player")) {
    ctx.drawImage(images.player, sx, top, pW, pH);

    // mouth-open reaction overlay — the source is a static photo, so a
    // literal mouth can't animate; we fake it with a small drawn shape
    // positioned over her mouth (fractions tuned to this specific photo).
    if (elapsed < player.mouthOpenUntil) {
      const mx = sx + pW * 0.55;
      const my = top + pH * 0.32;
      ctx.fillStyle = "#5a2020";
      ctx.beginPath();
      ctx.ellipse(mx, my, pW * 0.045, pW * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (elapsed < player.sparkleUntil) {
      drawHeadSparkle(sx + pW * 0.5, top + pH * 0.22, pH * 0.35);
    }
  } else {
    // REPLACE: player placeholder — simple Victorian silhouette.
    ctx.fillStyle = "#7a2530";
    roundRect(sx, top, pW, pH, pW * 0.15);
    ctx.fill();
    ctx.strokeStyle = "#2b1a0d";
    ctx.lineWidth = 2;
    roundRect(sx, top, pW, pH, pW * 0.15);
    ctx.stroke();
  }

  if (secretUnlocked) {
    const cx = sx + pW / 2;
    const cw = pW * 0.5, ch = pH * 0.16;
    const cy = top - ch * 0.5;
    ctx.fillStyle = "#c9a24a";
    ctx.beginPath();
    ctx.moveTo(cx - cw / 2, cy + ch);
    ctx.lineTo(cx - cw / 2, cy + ch * 0.3);
    ctx.lineTo(cx - cw / 4, cy + ch * 0.7);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + cw / 4, cy + ch * 0.7);
    ctx.lineTo(cx + cw / 2, cy + ch * 0.3);
    ctx.lineTo(cx + cw / 2, cy + ch);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawHeadSparkle(cx, cy, d) {
  ctx.save();
  ctx.strokeStyle = "#c9a24a";
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const a = elapsed * 5 + i * (Math.PI / 2);
    const r1 = d * 0.65, r2 = d * 0.85;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
    ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawSign(cx, baseY, scale) {
  if (scale <= 0.01 || !imgReady('ground_scroll')) return;
  ctx.save();
  ctx.translate(cx, baseY);
  ctx.scale(scale, scale);
  ctx.rotate(Math.sin(elapsed * 6) * 0.05 - 0.08);
  const img = images.ground_scroll;
  const h = H * 0.34;
  const w = h * (img.naturalWidth / img.naturalHeight);
  ctx.drawImage(img, -w / 2, -h, w, h);
  ctx.restore();
}

function drawDoctor() {
  let sx, dy, rot = 0, signScale = 0;
  const { width: doctorW, height: doctorH } = doctorSize();

  if (state === "intro") {
    sx = doctor.screenX;
    dy = groundY() - doctorH;
    signScale = doctor.signScale;
  } else {
    sx = doctor.worldX - cameraX;
    dy = groundY() - doctorH;
    if (sx < -doctorW * 2 || sx > W + doctorW * 2) return;
  }

  const bounce = Math.abs(Math.sin(doctor.bouncePhase)) * H * 0.01;
  dy -= bounce;

  if (doctorDancing) {
    dy += Math.sin(elapsed * 10) * H * 0.02;
    rot = Math.sin(elapsed * 8) * 0.18;
  }

  ctx.save();
  ctx.translate(sx + doctorW / 2, dy + doctorH / 2);
  ctx.rotate(rot);

  if (imgReady("doctor")) {
    ctx.drawImage(images.doctor, -doctorW / 2, -doctorH / 2, doctorW, doctorH);
  } else {
    // REPLACE: doctor sprite — white rectangle w/ red cross, labeled DR. BANDSCHEIBE
    ctx.fillStyle = "#ffffff";
    roundRect(-doctorW / 2, -doctorH / 2, doctorW, doctorH, doctorW * 0.25);
    ctx.fill();
    ctx.strokeStyle = "#c9c9c9";
    ctx.lineWidth = 2;
    roundRect(-doctorW / 2, -doctorH / 2, doctorW, doctorH, doctorW * 0.25);
    ctx.stroke();

    const cw = doctorW * 0.28, cl = doctorH * 0.4;
    ctx.fillStyle = "#e63946";
    ctx.fillRect(-cw / 2, -cl / 2, cw, cl);
    ctx.fillRect(-cl / 2, -cw / 2, cl, cw);

    ctx.fillStyle = "#333";
    ctx.font = "bold " + (doctorW * 0.15) + "px 'Playfair Display', serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.save();
    ctx.rotate(-Math.PI / 2);
    ctx.fillText("DR. BANDSCHEIBE", 0, -doctorH * 0.35);
    ctx.restore();
  }
  ctx.restore();

  if (signScale > 0.01) {
    drawSign(sx + doctorW / 2, dy, signScale);
  }

  if (doctorDancing) {
    ctx.font = (doctorW * 0.4) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("🎵", sx + doctorW / 2 + Math.sin(elapsed * 6) * 10, dy - H * 0.02);
  }
}

function render() {
  drawBackground();
  drawGroundAndGrid();
  drawObstacles();
  drawItems();
  drawDoctor();
  drawPlayer();
  drawParticles();
  drawVignette();
}

/* ============================================================
   MAIN LOOP
   ============================================================ */
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(0.05, (ts - lastTime) / 1000 || 0);
  lastTime = ts;

  if (state === "intro") updateIntro(dt);
  else if (state === "playing") update(dt);
  else if (state === "caught") updateCaught(dt);
  updateParticles(dt);

  if (state === "intro" || state === "playing" || state === "caught") {
    render();
    requestAnimationFrame(loop);
  } else if (state === "gameover") {
    render();
  }
}
</script>
